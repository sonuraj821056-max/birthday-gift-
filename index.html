<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    text-align:center;
    color:white;
    z-index:10;
    padding:20px;
    animation:fade 2s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-size:clamp(2rem,8vw,4rem);
    text-shadow:2px 2px 10px rgba(0,0,0,.3);
}

h2{
    margin-top:15px;
    font-size:clamp(1.2rem,5vw,2rem);
}

.cake{
    font-size:90px;
    margin:20px 0;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    50%{
        transform:translateY(-15px);
    }
}

p{
    margin-top:15px;
    font-size:18px;
    max-width:500px;
    line-height:1.6;
}

button{
    margin-top:25px;
    padding:14px 30px;
    border:none;
    border-radius:40px;
    background:white;
    color:#ff4081;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

/* Balloons */

.balloon{
    position:absolute;
    bottom:-150px;
    width:60px;
    animation:float linear infinite;
}

.balloon:nth-child(1){
    left:10%;
    animation-duration:9s;
}

.balloon:nth-child(2){
    left:30%;
    animation-duration:11s;
}

.balloon:nth-child(3){
    left:60%;
    animation-duration:8s;
}

.balloon:nth-child(4){
    left:85%;
    animation-duration:10s;
}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}

/* Confetti */

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-20px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

@media(max-width:600px){
    .cake{
        font-size:70px;
    }

    p{
        font-size:16px;
    }

    button{
        width:90%;
    }
}

</style>

</head>
<body>

<div class="container">
    <h1>🎉 Happy Birthday! 🎉</h1>

    <div class="cake">🎂</div>

    <h2>Wishing You Joy, Love & Happiness ❤️</h2>

    <p>
        May your special day be filled with smiles, laughter,
        unforgettable memories, and endless happiness.
        Have an amazing birthday! 🎈✨
    </p>

    <button onclick="celebrate()">🎁 Celebrate!</button>
</div>

<!-- Balloons -->

<div class="balloon" style="font-size:60px;">🎈</div>
<div class="balloon" style="font-size:55px;">🎈</div>
<div class="balloon" style="font-size:65px;">🎈</div>
<div class="balloon" style="font-size:58px;">🎈</div>

<script>

// Create Confetti
function createConfetti(){

    for(let i=0;i<200;i++){

        let conf=document.createElement("div");

        conf.className="confetti";

        conf.style.left=Math.random()*100+"vw";

        conf.style.background=
        `hsl(${Math.random()*360},100%,50%)`;

        conf.style.width=(5+Math.random()*8)+"px";
        conf.style.height=(5+Math.random()*8)+"px";

        conf.style.animationDuration=
        (3+Math.random()*4)+"s";

        conf.style.opacity=Math.random();

        document.body.appendChild(conf);

        setTimeout(()=>{
            conf.remove();
        },7000);

    }

}

// Start automatically
createConfetti();

function celebrate(){

    createConfetti();

    alert("🎂 Happy Birthday! Have an Amazing Year Ahead! 🎉");

}

</script>

</body>
</html>
